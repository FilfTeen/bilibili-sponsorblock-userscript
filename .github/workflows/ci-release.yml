name: ci-release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: echo "BSB_USERSCRIPT_UPDATE_REF=main" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

      - name: Upload userscript artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-sponsorblock-userscript
          path: dist/bilibili-sponsorblock.user.js

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: echo "BSB_USERSCRIPT_UPDATE_REF=main" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/bilibili-sponsorblock.user.js
